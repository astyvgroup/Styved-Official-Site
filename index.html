<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styved | Coming Soon</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #0d1117; color: #c9d1d9; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; }
        .container { max-width: 600px; }
        .logo { font-size: 2.5rem; font-weight: 800; color: #ffffff; letter-spacing: -0.05em; margin-bottom: 1rem; position: relative; display: inline-block; }
        .logo::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #58a6ff, #bc8cff); border-radius: 2px; }
        h1 { font-size: 1.8rem; font-weight: 400; color: #8b949e; margin-bottom: 1.5rem; margin-top: 1.5rem; }
        p { font-size: 1.1rem; color: #8b949e; line-height: 1.6; }
        .badge { display: inline-block; padding: 0.35em 0.65em; font-size: 0.75em; font-weight: 700; color: #58a6ff; background-color: rgba(56, 139, 253, 0.15); border: 1px solid rgba(56, 139, 253, 0.4); border-radius: 2rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; }
        footer { position: absolute; bottom: 20px; font-size: 0.85rem; color: #484f58; width: 100%; left: 0; }
    </style>
</head>
<body>
    <div class="container">
        <span class="badge">Under Construction</span>
        <br><div class="logo">Styved</div>
        <h1>Something exciting is in the works.</h1>
        <p>We are building a brand new digital experience. Our official website is launching soon—stay tuned for updates.</p>
    </div>
    <footer>&copy; 2026 Styved. All rights reserved.</footer>
</body>
</html>
